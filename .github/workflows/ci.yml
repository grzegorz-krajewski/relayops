name: CI

on:
  push:
  pull_request:

jobs:
  gateway-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
      - run: go mod download
      - run: go build ./...

  worker-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py
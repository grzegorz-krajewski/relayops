services:
  gateway-go:
    build:
      context: ../../apps/gateway-go
    container_name: relayops-gateway
    env_file:
      - ../../.env
    depends_on:
      - redis
      - postgres
    ports:
      - "${GATEWAY_HOST_PORT}:8080"
      - "${GATEWAY_METRICS_HOST_PORT}:9090"

  worker-py:
    build:
      context: ../../apps/worker-py
    container_name: relayops-worker
    env_file:
      - ../../.env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: relayops-redis

  postgres:
    image: postgres:16-alpine
    container_name: relayops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  nginx:
    image: nginx:stable-alpine
    container_name: relayops-nginx
    depends_on:
      - gateway-go
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT}:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: relayops-prometheus
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT}:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: relayops-grafana
    depends_on:
      - prometheus
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "${GRAFANA_PORT}:3000"